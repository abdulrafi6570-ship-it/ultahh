kind = "web"
previewPath = "/"
title = "BirthdayOS"
version = "1.0.0"
id = "artifacts/birthday-os"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20197

[services.development]
run = "pnpm --filter @workspace/birthday-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/birthday-os", "run", "build" ]
serve = "static"
publicDir = "artifacts/birthday-os/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20197"
BASE_PATH = "/"
